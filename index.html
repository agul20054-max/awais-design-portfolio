<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Owais Gulzar | Senior Graphic Designer</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">

<style>
body{
    font-family:'Space Grotesk',sans-serif;
    background:#0b0b0f;
    color:white;
    overflow-x:hidden;
    cursor:none;
}

/* Loader */
#loader{
    position:fixed;
    inset:0;
    background:#0b0b0f;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9999;
    transition:1s;
}
.loader-text{
    font-size:2rem;
    letter-spacing:4px;
    animation:pulse 1.5s infinite;
}
@keyframes pulse{
    0%{opacity:0.3}
    50%{opacity:1}
    100%{opacity:0.3}
}

/* Custom Cursor */
.cursor{
    width:20px;
    height:20px;
    border:2px solid #8b5cf6;
    border-radius:50%;
    position:fixed;
    pointer-events:none;
    transform:translate(-50%,-50%);
    transition:0.1s ease;
    z-index:99999;
}
.cursor.active{
    transform:translate(-50%,-50%) scale(2);
    background:#8b5cf6;
    opacity:0.3;
}

/* Portfolio */
.portfolio-item{
    position:relative;
    overflow:hidden;
    border-radius:20px;
    cursor:pointer;
}
.portfolio-item img{
    transition:0.6s ease;
}
.portfolio-item:hover img{
    transform:scale(1.1);
}
.overlay{
    position:absolute;
    inset:0;
    background:linear-gradient(to top,rgba(0,0,0,0.9),transparent);
    opacity:0;
    transition:0.4s;
}
.portfolio-item:hover .overlay{
    opacity:1;
}

/* Lightbox */
#lightbox{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.95);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:9998;
    opacity:0;
    visibility:hidden;
    transition:0.4s;
}
#lightbox.active{
    opacity:1;
    visibility:visible;
}
#lightbox img{
    max-width:90%;
    max-height:90%;
    border-radius:20px;
}

/* Scroll animation */
.fade-up{
    opacity:0;
    transform:translateY(50px);
    transition:1s ease;
}
.fade-up.show{
    opacity:1;
    transform:translateY(0);
}
.gradient-text{
    background:linear-gradient(90deg,#8b5cf6,#3b82f6);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}
</style>
</head>

<body>

<!-- Loader -->
<div id="loader">
<div class="loader-text gradient-text">OWAIS GULZAR</div>
</div>

<!-- Custom Cursor -->
<div class="cursor" id="cursor"></div>

<!-- HERO -->
<section class="min-h-screen flex items-center justify-center px-6">
<div class="max-w-7xl mx-auto grid md:grid-cols-2 gap-12 items-center">

<div class="fade-up">
<p class="text-purple-400 tracking-widest mb-4">SENIOR GRAPHIC DESIGNER</p>
<h1 class="text-6xl font-bold mb-6">
OWAIS<br><span class="gradient-text">GULZAR</span>
</h1>
<p class="text-gray-400 mb-8">
Luxury branding & high-end visual design solutions for modern businesses.
</p>
</div>

<div class="fade-up flex justify-center">
<img src="images/profile.jpg" class="w-80 h-96 object-cover rounded-3xl shadow-2xl">
</div>

</div>
</section>

<!-- PORTFOLIO -->
<section class="py-24 px-6">
<div class="max-w-7xl mx-auto">
<h2 class="text-5xl font-bold mb-16 text-center fade-up">
Selected <span class="gradient-text">Works</span>
</h2>

<div class="grid md:grid-cols-3 gap-8">

<div class="portfolio-item fade-up" onclick="openLightbox(this)">
<img src="images/al-noor.jpg">
<div class="overlay flex items-end p-6">
<h3 class="font-bold">Al Noor Branding</h3>
</div>
</div>

<div class="portfolio-item fade-up" onclick="openLightbox(this)">
<img src="images/menu.jpg">
<div class="overlay flex items-end p-6">
<h3 class="font-bold">Restaurant Menu</h3>
</div>
</div>

<div class="portfolio-item fade-up" onclick="openLightbox(this)">
<img src="images/ksk.jpg">
<div class="overlay flex items-end p-6">
<h3 class="font-bold">KSK Identity</h3>
</div>
</div>

<div class="portfolio-item fade-up" onclick="openLightbox(this)">
<img src="images/robbery.jpg">
<div class="overlay flex items-end p-6">
<h3 class="font-bold">Robbery Packaging</h3>
</div>
</div>

<div class="portfolio-item fade-up" onclick="openLightbox(this)">
<img src="images/fixpro.jpeg">
<div class="overlay flex items-end p-6">
<h3 class="font-bold">FixPro Branding</h3>
</div>
</div>

<div class="portfolio-item fade-up" onclick="openLightbox(this)">
<img src="images/amul.jpg">
<div class="overlay flex items-end p-6">
<h3 class="font-bold">Amul Identity</h3>
</div>
</div>

</div>
</div>
</section>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
<img id="lightbox-img">
</div>

<script>

/* Loader */
window.addEventListener("load",()=>{
setTimeout(()=>{
document.getElementById("loader").style.opacity="0";
document.getElementById("loader").style.visibility="hidden";
},1500);
});

/* Cursor */
const cursor=document.getElementById("cursor");
document.addEventListener("mousemove",e=>{
cursor.style.left=e.clientX+"px";
cursor.style.top=e.clientY+"px";
});
document.querySelectorAll("a, .portfolio-item").forEach(el=>{
el.addEventListener("mouseenter",()=>cursor.classList.add("active"));
el.addEventListener("mouseleave",()=>cursor.classList.remove("active"));
});

/* Scroll reveal */
const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show");
}
});
});
document.querySelectorAll(".fade-up").forEach(el=>observer.observe(el));

/* Lightbox */
function openLightbox(element){
const img=element.querySelector("img").src;
document.getElementById("lightbox-img").src=img;
document.getElementById("lightbox").classList.add("active");
}
function closeLightbox(){
document.getElementById("lightbox").classList.remove("active");
}

</script>

</body>
</html>
